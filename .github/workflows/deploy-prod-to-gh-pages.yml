name: Deploy Prod to gh-pages
on:
  push:
    branches: [ main ]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy prod
        uses: peaceiris/actions-gh-pages@v3
        with:
          publish_dir: ./prod
          publish_branch: gh-pages
          commit_message: "ci: deploy prod to gh-pages"
