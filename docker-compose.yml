services:
  demo:
    build: .
    image: euroleague-sankey
    working_dir: /app
    # Mount only assets so demos can read/write curated demo JSONs. Do NOT mount the full repo.
    volumes:
      - ./assets:/app/assets
    # Primary entry point: small curated batch + viewer JSON + validation.
    # Classification: Demo / Lab only (not for PROD).
    # Usage: `docker compose run demo` — generates demo bundles for local UI testing.
    command: ["demo"]

  demo_auto_insights:
    image: euroleague-sankey
    working_dir: /app
    # Mount only assets for demo generation and enrichment.
    volumes:
      - ./assets:/app/assets
    # Experimental entry point: generate a single demo game and enrich with auto insights.
    # Classification: Demo / Lab (experimental).
    # Usage: `docker compose run demo_auto_insights` — creates a single demo bundle with insights.
    command: ["demo_auto_insights"]

  pipeline:
    image: euroleague-sankey
    working_dir: /app
    # Mount only assets so pipeline can write raw/processed files without exposing repo source tree.
    volumes:
      - ./assets:/app/assets
    # Pipeline runner: prefer explicit entrypoint so callers can append args.
    # Usage examples:
    #  - default (no args): runs the example batch below
    #  - override args: `docker compose run pipeline -- --seasoncode E2025 --gamecode 54,55`
    # Classification: Backend (can be used for both dev and production data generation).
    # Note: when used for production, ensure output files are placed in durable storage (S3/CDN).
    entrypoint: ["python", "pipeline_runner.py"]
    command: [
      "--seasoncode", "E2021",
      "--gamecode", "54,55",
      "--output-dir", "/app",
      "--output-pattern", "multi_drilldown_real_data_{seasoncode}_{gamecode}.json"
    ]

  tests:
    build:
      context: .
      target: tests
    image: euroleague-sankey-tests
    working_dir: /app
    # Tests run from the image; do NOT mount the full repo. Tests are baked into the image.
    # Pytest-based test suite: entrypoint is pytest; callers can append pytest args.
    # Classification: Dev / CI only (not for serving production site).
    # Examples:
    #  - default: `docker compose run tests` -> runs `pytest -q tests`
    #  - with extra args: `docker compose run tests -k pattern -q` -> runs `pytest -k pattern -q`
    entrypoint: ["python", "-m", "pytest"]
    command: ["-q", "tests"]

  compute_elo:
    image: euroleague-sankey
    working_dir: /app
    volumes:
      - ./:/app
    # Compute ELO ratings for all games in a season and write elo_{seasoncode}.json.
    # Run after season_sync to have up-to-date game data.
    entrypoint: ["python"]
    command: [
      "elo.py",
      "--seasoncode", "E2021",
      "--output-dir", "/app/assets/processed"
    ]

  season_sync:
    image: euroleague-sankey
    working_dir: /app
    # Mount only assets so season_sync writes into the assets folder (durable storage path).
    volumes:
      - ./assets:/app/assets
      - ./scripts:/app/scripts
      - ./build_from_euroleague_api.py:/app/build_from_euroleague_api.py
      - ./validate_output.py:/app/validate_output.py
    # Fill up data for a block of games in a given season and refresh `games_manifest.json`.
    # Classification: Backend (used to populate processed JSONs for the UI).
    # Usage: `docker compose run season_sync --seasoncode E2025 --dry-run`.
    # When using for PROD, mount or set `BASKET_APP_FILE_STORE_URI` to durable storage and avoid committing large JSONs to git.
    entrypoint: ["python", "season_sync.py"]
    command: [
      "--seasoncode", "E2021",
      "--start-gamecode", "1",
      "--end-gamecode", "200",
      "--output-dir", "/app"
    ]

  season_sync_dry:
    image: euroleague-sankey
    working_dir: /app
    volumes:
      - ./assets:/app/assets
    # Dry-run variant: preview which games would be built without touching the filesystem.
    # Classification: Backend / Dev (dry-run only).
    # Usage: `docker compose run season_sync_dry --seasoncode E2025` or use `season_sync` with `--dry-run`.
    # Keep entrypoint/script in the entrypoint so args passed to `docker compose run` are forwarded.
    entrypoint: ["python", "season_sync.py"]
    command: [
      "--seasoncode", "E2021",
      "--start-gamecode", "1",
      "--end-gamecode", "200",
      "--output-dir", "/app",
      "--dry-run"
    ]

  validate_auto_json:
    image: euroleague-sankey
    working_dir: /app
    # Mount only processed assets for validation; helper script is baked into the runtime image.
    volumes:
      - ./assets/processed:/app/assets/processed
    # Lightweight JSON validity checker: validate processed JSONs under `assets/processed`.
    # Classification: Dev / CI helper (not for PROD asset generation).
    # Usage: `docker compose run validate_auto_json` — checks all `*.json` by default.
    # You may pass a single glob pattern as an arg to target files, e.g.:
    #   docker compose run validate_auto_json "multi_drilldown_real_data_E2025_*.json"
    entrypoint: ["python", "scripts/validate_processed.py"]
    command: ["*.json"]

