# clubs.yaml — Source of truth for Euroleague club entity declarations.
#
# Schema:
#   name:                        Display name for UI and internal canonical identifier.
#                                Must be stable — this is what gets stored in all processed JSONs.
#   registered_names_historically:
#                                Ordered list of known API-reported names for this club.
#                                First item = most recent / currently active name.
#                                Each subsequent item = an older registered name (sponsor change,
#                                rebranding, API inconsistency, truncation artefact, etc.).
#                                The canonical `name` above does NOT need to appear here —
#                                it is always implicitly resolved to itself.
#
# When to update this file:
#   - A team gets a new sponsor in their name → prepend it to registered_names_historically.
#   - A new team joins the league → add a new entry (registered_names_historically may be empty).
#   - An API artefact / truncated name is spotted → add as a registered alias.
#
# Derived fields (computed at runtime, not stored here):
#   id: lowercase(name), spaces → dashes  e.g. "Real Madrid" → "real-madrid"

